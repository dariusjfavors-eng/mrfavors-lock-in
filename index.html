<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Regents Lock-In — Algebra I</title>
<!--
================================================================================
  MR. FAVORS' REGENTS LOCK-IN — Algebra I MC Trainer
  v1.0 | Single-file HTML | White exam-paper aesthetic

  MODULES (search "MODULE:" to jump)
    1. LENS_LIBRARY ...... 10 TI-84 strategies
    2. QUESTION_BANK ..... 15 Regents-style questions (label: 1/2/3/4)
    3. ANALYTICS ......... anonymous FAVORit schema
    4. UI_STATE .......... state machine
    5. UI_RENDER ......... view renderers
    6. UI_HANDLERS ....... event wiring
    7. INIT .............. boot

  DESIGN CONTRACT
    - White exam-paper aesthetic (#FFFFFF background, #000000 ink)
    - Arial only — no web font imports
    - Choices labeled (1)(2)(3)(4), never A/B/C/D
    - 2-column grid for short choices; stacked for long (>40 chars)
    - Feedback: correct #1A5C1A, incorrect #8B0000, hint #00008B
    - No shadows, no gradients, no card elevation
================================================================================
-->
<style>
/* ============================================================================
   TOKENS
============================================================================ */
:root {
  --ink:         #000000;
  --page:        #FFFFFF;
  --correct:     #1A5C1A;
  --incorrect:   #8B0000;
  --hint:        #00008B;
  --correct-bg:  #d4edda;
  --incorrect-bg:#f8d7da;
  --hint-bg:     #e8f0fe;
  --hover:       #f0f0f0;
  --selected:    #e8e8e8;
  --rule:        #000000;
  --muted:       #555555;
  --font:        Arial, Helvetica, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--page);
  color: var(--ink);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ============================================================================
   FIXED PAGE HEADER (always visible — exam booklet header)
============================================================================ */
.page-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 36px;
  background: var(--page);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  z-index: 200;
}

/* ============================================================================
   APP SHELL
============================================================================ */
#app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 52px 24px 40px;
}

/* ============================================================================
   NAVIGATION
============================================================================ */
.nav {
  display: flex;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 36px;
}
.nav button {
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  padding: 8px 18px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  color: var(--ink);
}
.nav button:hover { background: var(--hover); }
.nav button.active { border-bottom-color: var(--ink); }

/* ============================================================================
   HOME — EXAM COVER PAGE
============================================================================ */
.cover {
  max-width: 560px;
  margin: 0 auto;
  padding: 40px 0 32px;
  text-align: center;
}
.cover-institution {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.cover-exam-line {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 28px;
}
.cover-subject {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}
.cover-subtitle {
  font-size: 13px;
  margin-bottom: 36px;
  color: var(--muted);
}
.cover-field {
  max-width: 420px;
  margin: 0 auto 8px;
  text-align: left;
  font-size: 13px;
  border-bottom: 1px solid var(--ink);
  padding-bottom: 4px;
}
.cover-divider {
  border: none;
  border-top: 2px solid var(--ink);
  max-width: 420px;
  margin: 28px auto 16px;
}
.cover-mode-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  max-width: 420px;
  margin: 0 auto 6px;
  text-align: left;
}
.cover-mode-instructions {
  font-size: 13px;
  max-width: 420px;
  margin: 0 auto 16px;
  text-align: left;
  color: var(--muted);
}
.cover-btn-row {
  display: flex;
  gap: 12px;
  max-width: 420px;
  margin: 0 auto;
}
.cover-stat {
  margin-top: 24px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

/* ============================================================================
   BUTTONS
============================================================================ */
.btn {
  background: var(--ink);
  color: var(--page);
  border: none;
  padding: 10px 20px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  flex: 1;
}
.btn:hover { background: #333; }
.btn.secondary {
  background: var(--page);
  color: var(--ink);
  border: 2px solid var(--ink);
}
.btn.secondary:hover { background: var(--hover); }
.btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.btn-row .btn { flex: 0 0 auto; }

/* ============================================================================
   SECTION HEADINGS
============================================================================ */
.section-title {
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 6px;
  margin-bottom: 4px;
}
.section-sub {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 20px;
}

/* ============================================================================
   LENS LIBRARY
============================================================================ */
.lens-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  border-top: 1px solid var(--ink);
  border-left: 1px solid var(--ink);
  margin-bottom: 0;
}
.lens-card {
  border-right: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 16px;
  cursor: pointer;
  background: var(--page);
  position: relative;
}
.lens-card:hover { background: var(--hover); }
.lens-num {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
}
.lens-icon {
  position: absolute;
  top: 14px; right: 16px;
  font-size: 18px;
}
.lens-card h4 {
  font-size: 15px;
  font-weight: 700;
  margin: 6px 0 4px;
}
.lens-card .lens-tag {
  font-size: 13px;
  color: #333;
  margin-bottom: 10px;
}
.lens-card .lens-when {
  font-size: 12px;
  color: var(--muted);
  border-top: 1px solid #ccc;
  padding-top: 8px;
}

/* LENS DETAIL */
.lens-detail {
  border: 1px solid var(--ink);
  padding: 24px;
  margin-top: 16px;
}
.lens-detail-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--ink);
  padding-bottom: 16px;
  margin-bottom: 20px;
}
.lens-detail-head .eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 6px;
}
.lens-detail-head h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
.lens-icon-big { font-size: 40px; }
.lens-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 700px) { .lens-detail-grid { grid-template-columns: 1fr; } }
.lens-detail-col h3 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  border-bottom: 1px solid var(--ink);
  padding-bottom: 4px;
  margin-bottom: 10px;
}

.ti-screen {
  background: #f8f8f8;
  border: 1px solid var(--ink);
  padding: 12px 14px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  color: var(--ink);
  line-height: 1.8;
}
.ti-screen .step-num { display: inline-block; width: 22px; color: var(--muted); }
.ti-screen .key {
  display: inline-block;
  background: var(--ink);
  color: var(--page);
  padding: 0 5px;
  font-size: 11px;
  margin: 0 2px;
}

.example-block {
  border-left: 3px solid var(--ink);
  padding: 10px 14px;
  background: #f8f8f8;
  margin-top: 12px;
}
.ex-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  font-weight: 700;
}
.ex-prob { font-size: 14px; font-weight: 700; margin: 6px 0 2px; }
.ex-walk { font-size: 13px; color: #333; }

.warn-block {
  border-left: 3px solid var(--incorrect);
  padding: 8px 12px;
  background: var(--incorrect-bg);
  margin-top: 12px;
}
.warn-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  color: var(--incorrect);
}
.warn-block p { font-size: 13px; margin-top: 4px; }

.standard-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.standard-pill {
  font-size: 11px;
  padding: 2px 7px;
  border: 1px solid var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ============================================================================
   PRACTICE MODE
============================================================================ */
/* .practice-wrap grid removed — two-column layout now handled by #content-row */

.problem-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  border-bottom: 1px solid var(--ink);
  padding-bottom: 8px;
  margin-bottom: 20px;
}
.problem-stem {
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* CHOICES */
.choices {
  margin-bottom: 16px;
}
.choices.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  grid-auto-flow: column;
  gap: 4px;
}
.choices.stack {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.choice {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--page);
  border: 1px solid var(--ink);
  padding: 10px 14px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.4;
  text-align: left;
  width: 100%;
}
.choice:hover:not(.disabled) { background: var(--hover); }
.choice.selected { background: var(--selected); border-width: 2px; }
.choice.correct { background: var(--correct-bg); border-color: var(--correct); border-width: 2px; color: var(--correct); }
.choice.incorrect { background: var(--incorrect-bg); border-color: var(--incorrect); border-width: 2px; color: var(--incorrect); }
.choice.disabled { cursor: not-allowed; }
.choice-label { min-width: 28px; font-weight: 400; flex-shrink: 0; }

/* LENS PICK PHASE */
.lens-picker-prompt {
  border: 1px solid var(--hint);
  background: var(--hint-bg);
  padding: 14px 16px;
  margin-bottom: 14px;
}
.pp-eyebrow {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--hint);
}
.lens-picker-prompt p { font-size: 14px; margin-top: 6px; }

.lens-picker-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  margin-top: 12px;
}
.lens-pick {
  background: var(--page);
  border: 1px solid var(--ink);
  padding: 9px 12px;
  cursor: pointer;
  text-align: left;
  font-family: var(--font);
  font-size: 13px;
  color: var(--ink);
}
.lens-pick:hover { background: var(--hover); }
.lens-pick.lens-highlight {
  border-left: 3px solid var(--hint);
  background: var(--hint-bg);
}
.wrong-drill-strip {
  margin: 10px 0 0;
  padding: 8px 12px;
  background: var(--hint-bg);
  border-left: 3px solid var(--hint);
  font-size: 13px;
  color: var(--hint);
}
.lp-num {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 2px;
}

/* FEEDBACK */
.feedback {
  padding: 12px 16px;
  margin-bottom: 14px;
}
.feedback.good { background: var(--correct-bg); border-left: 4px solid var(--correct); color: var(--correct); }
.feedback.soft { background: #fff3cd; border-left: 4px solid #856404; color: #856404; }
.feedback.bad  { background: var(--incorrect-bg); border-left: 4px solid var(--incorrect); color: var(--incorrect); }
.fb-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; }
.feedback p { margin-top: 4px; font-size: 14px; color: var(--ink); }

/* SIDE RAIL */
.side-rail { display: flex; flex-direction: column; gap: 16px; }
.rail-card { border: 1px solid var(--ink); padding: 14px; }
.rail-card h4 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
  border-bottom: 1px solid var(--ink);
  padding-bottom: 6px;
}
.rail-card p { font-size: 13px; color: #333; }
.ti-iframe {
  width: 100%;
  height: 560px;
  border: 1px solid var(--ink);
  display: block;
  background: #fff;
}
.ti-fallback {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-top: 8px;
}
.ti-fallback a { color: var(--hint); }

/* ============================================================================
   CHALLENGE MODE
============================================================================ */
.timer-track {
  height: 6px;
  background: #e0e0e0;
  border: 1px solid var(--ink);
  margin-bottom: 6px;
  overflow: hidden;
}
.timer-fill {
  height: 100%;
  background: var(--ink);
  transition: width 1s linear;
}
.timer-fill.urgent { background: var(--incorrect); }
.timer-text {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 14px;
}
.timer-text.urgent { color: var(--incorrect); font-weight: 700; }

.challenge-results {
  max-width: 600px;
  margin: 0 auto;
}
.results-score {
  font-size: 48px;
  font-weight: 700;
  text-align: center;
  margin: 20px 0 4px;
}
.results-label {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  text-align: center;
  color: var(--muted);
  margin-bottom: 28px;
}
.results-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  margin-bottom: 20px;
}
.results-table th, .results-table td {
  border: 1px solid var(--ink);
  padding: 8px 12px;
  text-align: left;
}
.results-table th {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: #f0f0f0;
}
.results-table td.pass { color: var(--correct); font-weight: 700; }
.results-table td.fail { color: var(--incorrect); font-weight: 700; }

.stub-block {
  border: 1px solid var(--ink);
  padding: 60px 30px;
  text-align: center;
  max-width: 600px;
  margin: 0 auto;
}
.stub-block h2 { font-size: 24px; margin-bottom: 12px; }
.stub-block p { font-size: 14px; color: var(--muted); margin-bottom: 8px; }

/* ============================================================================
   FOOTER
============================================================================ */
.footer {
  margin-top: 48px;
  padding: 12px 0;
  border-top: 1px solid var(--ink);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}

.hidden { display: none !important; }

/* ============================================================================
   CONTENT ROW — main + persistent rail
============================================================================ */
#content-row {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}
#main {
  flex: 1 1 0;
  min-width: 0;
}
#persistent-rail {
  flex: 0 0 360px;
  width: 360px;
}
@media (max-width: 920px) {
  #content-row { flex-direction: column; }
  #persistent-rail { flex: 0 0 auto; width: 100%; }
}
/* ── Math rendering ─────────────────────────────────────── */
.mfrac {
  display: inline-flex; flex-direction: column;
  align-items: center; vertical-align: middle;
  font-size: 0.92em; margin: 0 2px; line-height: 1.2;
}
.mfrac .mnum { border-bottom: 1.5px solid currentColor; padding: 0 3px; text-align: center; }
.mfrac .mden { padding: 0 3px; text-align: center; }
.msqrt { display: inline-flex; align-items: flex-end; margin: 0 1px; }
.msqrt .mrad { font-size: 1.15em; line-height: 1; margin-right: -1px; vertical-align: baseline; }
.msqrt .mbody { border-top: 1.5px solid currentColor; padding: 1px 3px 0; }
.mcoef { font-style: normal; }

/* PRACTICE MODE HOME */
.practice-mode-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 20px;
}
@media (max-width: 700px) {
  .practice-mode-grid { grid-template-columns: 1fr; }
}
.pmode-card {
  border: 1px solid var(--ink);
  padding: 20px 16px;
  cursor: pointer;
  background: var(--page);
  text-align: center;
}
.pmode-card:hover { background: var(--hover); }
.pmode-icon { font-size: 26px; margin-bottom: 10px; }
.pmode-card h4 { font-size: 14px; font-weight: 700; margin: 0 0 8px; }
.pmode-card p { font-size: 12px; color: var(--muted); margin: 0; line-height: 1.4; }
</style>
</head>

<body>

<!-- Fixed exam booklet page header -->
<div class="page-header">
  <span>Algebra I &mdash; Mr. Favors&rsquo; Regents Lock-In</span>
  <span>Use this space for computations.</span>
</div>

<div id="app">
  <nav class="nav" id="nav">
    <button data-view="home" class="active">Home</button>
    <button data-view="library">Lens Library</button>
    <button data-view="practice">Practice</button>
    <button data-view="challenge">Challenge</button>
  </nav>

  <div id="content-row">
    <main id="main"></main>

    <aside id="persistent-rail" class="side-rail hidden">
      <div class="rail-card" style="padding:12px;">
        <h4>TI-84 Online</h4>
        <iframe
          src="https://ti84online.com"
          title="TI-84 Calculator Emulator"
          class="ti-iframe"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
          loading="lazy"
        ></iframe>
        <div class="ti-fallback">
          Blank? <a href="https://ti84online.com" target="_blank" rel="noopener">Open standalone &nearr;</a>
        </div>
      </div>
      <div class="rail-card" id="lens-hint-card">
        <h4>Lens Hint</h4>
        <p id="lens-hint-text"></p>
      </div>
    </aside>
  </div>

  <footer class="footer">
    <span>Anon session &middot; No PII</span>
    <span id="session-id"></span>
  </footer>
</div>

<script>
/* ============================================================================
   MODULE: LENS_LIBRARY
   10 reusable TI-84 + reasoning strategies.
============================================================================ */
const LENSES = [
  {
    id: 1, code: 'L01', name: 'Y= Intersection', icon: '⨯',
    tagline: 'Two graphs cross — that x is your answer.',
    when: 'Solving equations, systems, "for what value of x"',
    keystrokes: [
      ['Y=', 'enter LEFT side as Y1'],
      ['↓', 'enter RIGHT side as Y2'],
      ['GRAPH', 'press ZOOM 6 if nothing visible'],
      ['2nd → TRACE → 5: intersect', 'launches intersection finder'],
      ['ENTER × 3', 'left curve, right curve, guess'],
      ['Read X=', 'that\'s your solution']
    ],
    example: {
      problem: '2x + 5 = −x + 11',
      walkthrough: 'Y1 = 2X+5, Y2 = −X+11. ZOOM 6 → 2nd TRACE → 5 → ENTER×3. X = 2.'
    },
    standards: ['A.REI.3', 'A.REI.6', 'A.REI.10', 'A.REI.11'],
    pitfall: 'If lines look parallel on screen, check slopes — may be no solution.'
  },
  {
    id: 2, code: 'L02', name: 'Y= Zeros / Roots', icon: '∅',
    tagline: 'Where the graph crosses the x-axis = your roots.',
    when: 'Find roots, x-intercepts, solutions to set-equal-to-zero equations',
    keystrokes: [
      ['Y=', 'enter expression as Y1 (set to 0)'],
      ['GRAPH', 'see the curve'],
      ['2nd → TRACE → 2: zero', 'launches zero finder'],
      ['Left bound', 'cursor LEFT of root, ENTER'],
      ['Right bound', 'cursor RIGHT of root, ENTER'],
      ['Guess', 'ENTER once more'],
      ['Repeat', 'for each root']
    ],
    example: {
      problem: 'x² − 7x + 12 = 0',
      walkthrough: 'Y1 = X²−7X+12. Two zeros visible. 2nd TRACE → 2 → bounds → roots at x=3 and x=4.'
    },
    standards: ['A.REI.4', 'A.APR.3', 'F.IF.7'],
    pitfall: 'No visible zeros = no real solutions.'
  },
  {
    id: 3, code: 'L03', name: 'Plug & Check', icon: '✓',
    tagline: 'Test each answer choice against the equation.',
    when: 'MC with numerical choices, "which value satisfies", verifying solutions',
    keystrokes: [
      ['Pick a choice value', 'e.g., x = 3'],
      ['3 → STO → X,T,θ,n → ENTER', 'stores 3 into X'],
      ['Type the equation', 'does it return the expected value?'],
      ['Try other choices', 'until one works']
    ],
    example: {
      problem: 'Which value of x satisfies 3x − 7 = 2?',
      walkthrough: 'Try x=3: 3(3)−7 = 2 ✓. Answer is x = 3.'
    },

/* ============================================================================
   MATH HELPER — Renders LaTeX-like notation as HTML/CSS.
   Covers all Regents Algebra 1 notation: fractions, radicals, exponents.
   Usage: math('\\frac{1}{2}mv^{2}')  →  inline HTML string
============================================================================ */
function math(s) {
  // \text{...} and \sqrt{} must be stripped/rendered before \frac so that
  // [^{}]* in renderFrac can match numerators/denominators containing them
  s = s.replace(/\\text\{([^}]+)\}/g, '$1');
  // \sqrt{body} with optional coefficient: 2\sqrt{3}
  s = s.replace(/(\d*)\\sqrt\{([^}]+)\}/g, (_, coef, body) =>
    (coef ? `<span class="mcoef">${coef}</span>` : '') +
    `<span class="msqrt"><span class="mrad">√</span><span class="mbody">${body}</span></span>`);
  // \sqrt x (single token, no braces)
  s = s.replace(/(\d*)\\sqrt ([A-Za-z0-9])/g, (_, coef, body) =>
    (coef ? `<span class="mcoef">${coef}</span>` : '') +
    `<span class="msqrt"><span class="mrad">√</span><span class="mbody">${body}</span></span>`);
  // nested \frac (one level deep) — runs after \text and \sqrt so denominators with those are clean
  const renderFrac = str => str.replace(/\\frac\{([^{}]*)\}\{([^{}]*)\}/g,
    (_, n, d) => `<span class="mfrac"><span class="mnum">${n}</span><span class="mden">${d}</span></span>`);
  s = renderFrac(renderFrac(s)); // two passes handles a^{b}/c patterns
  // superscripts: ^{expr} or ^x
  s = s.replace(/\^\{([^}]+)\}/g, '<sup>$1</sup>');
  s = s.replace(/\^([A-Za-z0-9])/g, '<sup>$1</sup>');
  // subscripts: _{expr}
  s = s.replace(/\_\{([^}]+)\}/g, '<sub>$1</sub>');
  // symbols
  s = s.replace(/\\cdot/g, '·').replace(/\\times/g, '×')
       .replace(/\\leq/g, '≤').replace(/\\geq/g, '≥')
       .replace(/\\neq/g, '≠').replace(/\\pm/g, '±')
       .replace(/\\infty/g, '∞').replace(/\\pi/g, 'π')
       .replace(/\\ne /g, '≠ ');
  return s;
}

/* ============================================================================
   SVG HELPERS — Inline visual assets for image-bearing questions.
   Accuracy protocol: all pixel coords from explicit toX / toY mapping only.
   Never eyeball. See CONTEXT.md §6 and docs/ASSET_GUIDE.md.
============================================================================ */

function svgPlane({ xMin=-5, xMax=5, yMin=-5, yMax=5, W=280, H=280,
                    padL=36, padR=16, padT=16, padB=36, step=1 } = {}) {
  const iW = W - padL - padR, iH = H - padT - padB;
  const toX = x => ((x - xMin) / (xMax - xMin) * iW + padL).toFixed(1);
  const toY = y => (H - padB - (y - yMin) / (yMax - yMin) * iH).toFixed(1);
  const ox = +toX(0), oy = +toY(0);
  let s = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:8px auto;font-family:Arial,sans-serif;font-size:9px;">`;
  s += `<g stroke="#ccc" stroke-width="0.5">`;
  for (let x = xMin; x <= xMax; x += step) s += `<line x1="${toX(x)}" y1="${padT}" x2="${toX(x)}" y2="${H-padB}"/>`;
  for (let y = yMin; y <= yMax; y += step) s += `<line x1="${padL}" y1="${toY(y)}" x2="${W-padR}" y2="${toY(y)}"/>`;
  s += `</g>`;
  s += `<line x1="${padL}" y1="${oy}" x2="${W-padR}" y2="${oy}" stroke="#000" stroke-width="1.5"/>`;
  s += `<line x1="${ox}" y1="${padT}" x2="${ox}" y2="${H-padB}" stroke="#000" stroke-width="1.5"/>`;
  s += `<g fill="#000" text-anchor="middle">`;
  for (let x = xMin; x <= xMax; x += step) {
    if (x === 0) continue;
    s += `<text x="${toX(x)}" y="${oy + 12}">${x}</text>`;
  }
  s += `</g><g fill="#000" text-anchor="end">`;
  for (let y = yMin; y <= yMax; y += step) {
    if (y === 0) continue;
    s += `<text x="${ox - 4}" y="${+toY(y) + 3}">${y}</text>`;
  }
  s += `</g>`;
  s += `<text x="${W - padR}" y="${oy - 4}" font-size="10" fill="#000">x</text>`;
  s += `<text x="${ox + 4}" y="${padT + 10}" font-size="10" fill="#000">y</text>`;
  return s + `</svg>`;
}

function svgGraph(planeOpts = {}, fns = []) {
  const opts = { xMin:-5, xMax:5, yMin:-10, yMax:10, W:280, H:280,
                 padL:36, padR:16, padT:16, padB:36, step:1, ...planeOpts };
  const { xMin, xMax, yMin, yMax } = opts;
  let s = svgPlane(opts).replace('</svg>', '');
  const iW = opts.W - opts.padL - opts.padR, iH = opts.H - opts.padT - opts.padB;
  const toX = x => ((x - xMin) / (xMax - xMin) * iW + opts.padL).toFixed(1);
  const toY = y => (opts.H - opts.padB - (y - yMin) / (yMax - yMin) * iH).toFixed(1);
  for (const { fn, color = '#000', samples = 200, dash = '' } of fns) {
    let d = '', prev = null;
    for (let i = 0; i <= samples; i++) {
      const x = xMin + i * (xMax - xMin) / samples;
      const y = fn(x);
      if (!isFinite(y) || y < yMin - (yMax - yMin) || y > yMax + (yMax - yMin)) { prev = null; continue; }
      d += prev ? `L${toX(x)},${toY(y)}` : `M${toX(x)},${toY(y)}`;
      prev = true;
    }
    s += `<path d="${d}" stroke="${color}" stroke-width="1.8" fill="none"${dash ? ` stroke-dasharray="${dash}"` : ''}/>`;
  }
  return s + `</svg>`;
}

function svgTable(headers = [], rows = [], { caption = '' } = {}) {
  const st = 'border:1px solid #000;padding:5px 10px;font-size:14px;font-family:Arial,sans-serif;text-align:center;';
  const ths = headers.map(h => `<th style="${st}background:#f0f0f0;">${h}</th>`).join('');
  const trs = rows.map(r => `<tr>${r.map(c => `<td style="${st}">${c}</td>`).join('')}</tr>`).join('');
  return (caption ? `<p style="font-size:13px;margin:8px 0 4px;">${caption}</p>` : '')
    + `<div style="overflow-x:auto;margin:8px 0;"><table style="border-collapse:collapse;margin:0 auto;"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}

function svgScatter(planeOpts = {}, points = [], { r = 4, color = '#000' } = {}) {
  const opts = { xMin:0, xMax:10, yMin:0, yMax:10, W:280, H:280,
                 padL:40, padR:16, padT:16, padB:40, step:2, ...planeOpts };
  const { xMin, xMax, yMin, yMax } = opts;
  const iW = opts.W - opts.padL - opts.padR, iH = opts.H - opts.padT - opts.padB;
  const toX = x => ((x - xMin) / (xMax - xMin) * iW + opts.padL).toFixed(1);
  const toY = y => (opts.H - opts.padB - (y - yMin) / (yMax - yMin) * iH).toFixed(1);
  let s = svgPlane(opts).replace('</svg>', '');
  for (const [px, py] of points)
    s += `<circle cx="${toX(px)}" cy="${toY(py)}" r="${r}" fill="${color}" stroke="#000" stroke-width="0.5"/>`;
  return s + `</svg>`;
}

function svgBoxPlot({ min, q1, median, q3, max, label = '', W = 300, H = 80 } = {}) {
  const padL = 24, padR = 24, padT = 28, padB = 28;
  const iW = W - padL - padR, midY = H / 2, boxH = (H - padT - padB) * 0.65;
  const toX = v => ((v - min) / (max - min) * iW + padL).toFixed(1);
  let s = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:6px auto;font-family:Arial,sans-serif;font-size:9px;">`;
  if (label) s += `<text x="${W/2}" y="${padT - 6}" text-anchor="middle" font-size="11" fill="#000">${label}</text>`;
  s += `<line x1="${toX(min)}" y1="${midY}" x2="${toX(max)}" y2="${midY}" stroke="#000" stroke-width="1.5"/>`;
  s += `<rect x="${toX(q1)}" y="${midY - boxH/2}" width="${(+toX(q3) - +toX(q1)).toFixed(1)}" height="${boxH}" fill="#fff" stroke="#000" stroke-width="1.5"/>`;
  s += `<line x1="${toX(median)}" y1="${midY - boxH/2}" x2="${toX(median)}" y2="${midY + boxH/2}" stroke="#000" stroke-width="2"/>`;
  for (const v of [min, max]) {
    s += `<line x1="${toX(v)}" y1="${midY - boxH*0.4}" x2="${toX(v)}" y2="${midY + boxH*0.4}" stroke="#000" stroke-width="1.5"/>`;
    s += `<text x="${toX(v)}" y="${midY + boxH/2 + 14}" text-anchor="middle" fill="#000">${v}</text>`;
  }
  for (const v of [q1, median, q3])
    s += `<text x="${toX(v)}" y="${midY + boxH/2 + 14}" text-anchor="middle" fill="#000">${v}</text>`;
  return s + `</svg>`;
}

function svgBarGraph({ labels = [], values = [], yLabel = '', W = 280, H = 200,
                       padL = 44, padR = 16, padT = 20, padB = 44, barColor = '#333' } = {}) {
  const maxVal = Math.max(...values, 1), iH = H - padT - padB, iW = W - padL - padR;
  const toY = v => (padT + (1 - v / maxVal) * iH).toFixed(1);
  const barW = iW / labels.length;
  let s = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:6px auto;font-family:Arial,sans-serif;font-size:10px;">`;
  s += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="#000" stroke-width="1.5"/>`;
  s += `<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#000" stroke-width="1.5"/>`;
  if (yLabel) s += `<text x="${padL-32}" y="${H/2}" text-anchor="middle" transform="rotate(-90,${padL-32},${H/2})" font-size="11" fill="#000">${yLabel}</text>`;
  for (let i = 0; i < labels.length; i++) {
    const bx = (padL + i * barW + barW * 0.1).toFixed(1);
    const bw = (barW * 0.8).toFixed(1);
    const by = toY(values[i]);
    const bh = (H - padB - +by).toFixed(1);
    s += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="${barColor}" stroke="#000" stroke-width="0.5"/>`;
    s += `<text x="${(+bx + +bw/2).toFixed(1)}" y="${H-padB+14}" text-anchor="middle">${labels[i]}</text>`;
    s += `<text x="${(+bx + +bw/2).toFixed(1)}" y="${+by-3}" text-anchor="middle" font-size="9">${values[i]}</text>`;
  }
  return s + `</svg>`;
}

const JAN2026_DIST = [
  'F.IF.4','N.RN.3','A.REI.11','A.SSE.2','N.RN.3','A.APR.1',
  'F.IF.1','F.IF.2','A.CED.4','A.REI.6','A.REI.3','A.REI.3',

];

function sampleChallenge(attemptCount) {
  if (attemptCount === 0) {
    const used = new Set();
    const result = [];
    for (const std of JAN2026_DIST) {
      const pool = QUESTION_BANK.filter(q => q.standard === std && !used.has(q.id));
      const src = pool.length ? pool : QUESTION_BANK.filter(q => !used.has(q.id));
      if (src.length) { const q = shuffle(src)[0]; used.add(q.id); result.push(q.id); }
    }
    return shuffle(result);
  }
  return shuffle(QUESTION_BANK.map(q => q.id)).slice(0, 24);
}

    <div><span class="step-num">${i + 1}.</span><span class="key">${k[0]}</span>&nbsp; ${k[1]}</div>

  const stds = L.standards.map(s => `<span class="standard-pill">${s}</span>`).join('');

  main.innerHTML = `

        <div>
          <div class="eyebrow">Lens ${String(L.id).padStart(2,'0')} &middot; ${L.code}</div>
          <h2>${L.name}</h2>
          <p style="font-size:15px; color:#333; margin-top:4px;">${L.tagline}</p>
        </div>
        <span class="lens-icon-big">${L.icon}</span>
      </div>
      <div class="lens-detail-grid">
        <div class="lens-detail-col">
          <h3>When to Use</h3>
          <p style="font-size:14px; color:#333;">${L.when}</p>
          <h3 style="margin-top:20px;">Standards Tagged</h3>
          <div class="standard-pills">${stds}</div>
          ${L.pitfall ? `<div class="warn-block"><div class="warn-label">Pitfall</div><p>${L.pitfall}</p></div>` : ''}
        </div>
        <div class="lens-detail-col">
          <h3>TI-84 Keystrokes</h3>
          <div class="ti-screen">${keystrokes}</div>
          <div class="example-block">
            <div class="ex-label">Worked Example</div>
            <div class="ex-prob">${L.example.problem}</div>
            <div class="ex-walk">${L.example.walkthrough}</div>
          </div>
        </div>

}

/* ---- PRACTICE ---- */
function renderPractice() {
  const sv = STATE.practice.subView;
  if (sv === 'home')            return renderPracticeHome();
  if (sv === 'standard-picker') return renderStandardPicker();
  if (sv === 'lens-picker')     return renderLensPicker();

  /* subView === 'active' */
  const Q = currentQ();
  if (!Q) return renderPracticeHome();

  const phase = STATE.practice.phase;
  const isLensDrill = STATE.practice.drillMode === 'lens';
  const layout = choiceLayout(Q);
  let body = '';

  /* Phase 1: Lens Pick (skipped in lens drill) */
  if (phase === 'lens-pick') {
    const isWrongDrill = STATE.practice.drillMode === 'wrong';
    const highlightedLensIds = new Set();
    let diagnosticStrip = '';

    if (isWrongDrill) {
      const wrongPool = STATE.practice.wrongPool;
      const stdCounts = {};
      wrongPool.forEach(q => {
        stdCounts[q.standard] = (stdCounts[q.standard] || 0) + 1;
        highlightedLensIds.add(q.bestLens);
      });
      const stdText = Object.entries(stdCounts)
        .map(([s, n]) => `<strong>${s}</strong> (${n})`)
        .join(' &middot; ');
      diagnosticStrip = `
        <div class="wrong-drill-strip">
          Missed ${wrongPool.length} question${wrongPool.length !== 1 ? 's' : ''} &mdash; ${stdText}
        </div>`;
    }

    const lensOptions = LENSES.map(L => {
      const highlighted = isWrongDrill && highlightedLensIds.has(L.id);
      return `
        <button class="lens-pick${highlighted ? ' lens-highlight' : ''}" onclick="pickLens(${L.id})">
          <span class="lp-num">${L.code} &middot; ${L.icon}</span>
          ${highlighted ? `<strong>${L.name}</strong>` : L.name}
        </button>`;
    }).join('');

    body = `
      <div class="lens-picker-prompt">
        <div class="pp-eyebrow">Step 1 &mdash; Which lens?</div>
        <p>Read the problem. Before solving, pick the strategy that fits best. You&rsquo;ll see whether your lens is strong, workable, or off-target.</p>
        ${diagnosticStrip}
      </div>
      <div class="lens-picker-grid">${lensOptions}</div>
    `;
  }

  /* Phase 2: Walkthrough */
  if (phase === 'walkthrough') {
    const guess = STATE.practice.lensGuess;
    const isValid = Q.applicableLenses.includes(guess);
    const isBest  = Q.bestLens === guess;
    const guessLens = getLens(guess);
    const walkText = isValid
      ? Q.walkthroughs[guess]
      : `${guessLens.name} doesn&rsquo;t fit this problem well. Consider: ${Q.applicableLenses.map(id => getLens(id).name).join(', ')}.`;

    let fb = '';
    if (isBest)       fb = `<div class="feedback good"><div class="fb-label">Strong pick</div><p>${guessLens.name} is the most efficient lens here.</p></div>`;
    else if (isValid) fb = `<div class="feedback soft"><div class="fb-label">Workable</div><p>${guessLens.name} can crack it, but ${getLens(Q.bestLens).name} is faster.</p></div>`;
    else              fb = `<div class="feedback bad"><div class="fb-label">Off-target</div><p>${guessLens.name} won&rsquo;t help here. Look at what the problem is asking for.</p></div>`;

    body = `
      ${fb}
      <div class="lens-picker-prompt" style="margin-top:12px;">
        <div class="pp-eyebrow">Step 2 &mdash; Walkthrough (${guessLens.name})</div>
        <div class="ti-screen" style="margin-top:10px;">${walkText}</div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="advanceToAnswer()">Now pick your answer &rarr;</button>
        <button class="btn secondary" onclick="resetLensPick()">Re-pick lens</button>
      </div>
    `;
  }

  /* Phase 3 & 4: Answer / Review */
  if (phase === 'answer' || phase === 'review') {
    const choicesHtml = Q.choices.map(c => {
      let cls = 'choice';
      if (phase === 'answer' && STATE.practice.answerPick === c.label) cls += ' selected';
      if (phase === 'review') {
        if (c.label === Q.correctAnswer)                cls += ' correct';
        else if (c.label === STATE.practice.answerPick) cls += ' incorrect';
        cls += ' disabled';
      }
      const click = phase === 'answer' ? `onclick="pickAnswer('${c.label}')"` : '';
      return `
        <button type="button" class="${cls}" ${click} ${phase === 'review' ? 'disabled' : ''}>
          <span class="choice-label">(${c.label})</span>
          <span>${c.text}</span>
        </button>`;
    }).join('');

    let lockBtn = '';
    if (phase === 'answer' && STATE.practice.answerPick) {
      lockBtn = `<div class="btn-row"><button class="btn" onclick="lockAnswer()">Lock answer</button></div>`;
    }
    if (phase === 'review') {
      const correct = STATE.practice.answerPick === Q.correctAnswer;
      const lensName = getLens(STATE.practice.lensGuess) ? getLens(STATE.practice.lensGuess).name : '';
      const fb = correct
        ? `<div class="feedback good"><div class="fb-label">Correct</div><p>Standard ${Q.standard}. Lens used: ${lensName}.</p></div>`
        : `<div class="feedback bad"><div class="fb-label">Incorrect</div><p>Correct answer: (${Q.correctAnswer}). Common error: <strong>${Q.errorTags[0]}</strong>. Best lens: ${getLens(Q.bestLens).name}.</p></div>`;
      let walkExtra = '';
      if (isLensDrill && STATE.practice.lensGuess && Q.walkthroughs && Q.walkthroughs[STATE.practice.lensGuess]) {
        walkExtra = `<div class="lens-picker-prompt" style="margin-top:12px;"><div class="pp-eyebrow">How the ${lensName} lens solves it</div><div class="ti-screen" style="margin-top:8px;">${Q.walkthroughs[STATE.practice.lensGuess]}</div></div>`;
      }
      lockBtn = `${fb}${walkExtra}<div class="btn-row"><button class="btn" onclick="nextPracticeQ()">Next question &rarr;</button><button class="btn secondary" onclick="navigate('home')">Exit</button></div>`;
    }

    body = `<div class="choices ${layout}">${choicesHtml}</div>${lockBtn}`;
  }

  const drillLabel = isLensDrill
    ? `Lens Drill &mdash; ${getLens(STATE.practice.filterLens) ? getLens(STATE.practice.filterLens).name : ''}`
    : STATE.practice.drillMode === 'standard' && STATE.practice.filterStandard
      ? `Standard Drill &mdash; ${(STANDARD_CLUSTERS.find(c => c.key === STATE.practice.filterStandard) || {}).label || ''}`
      : STATE.practice.drillMode === 'wrong'
        ? 'Mistakes Drill'
        : 'Free Roam';

  main.innerHTML = `
    <div class="problem-meta">
      <span>Question ${STATE.practice.cursor + 1} of ${STATE.practice.queue.length} &middot; ${drillLabel}</span>
      <span>${Q.standard}</span>
    </div>
    <div class="problem-stem">${Q.stem}</div>
    ${body}
  `;
  showRail(true, true);
  if (isLensDrill && STATE.practice.filterLens) {
    const L = getLens(STATE.practice.filterLens);
    _lensHintText.textContent = L ? `${L.name}: ${L.tagline}` : 'Lens Drill';
  } else {
    _lensHintText.textContent = phase === 'lens-pick'
      ? 'What is the question asking for? An x-value? Roots? An equivalent expression? That tells you the lens family.'
      : 'Lens locked. Use the walkthrough as your script.';
  }
}

/* ---- CHALLENGE ---- */
function renderChallenge() {
  const C = STATE.challenge;

  if (!C.started) {
    showRail(false, false);
    main.innerHTML = `
      <div class="section-title">Challenge Mode</div>
      <div class="section-sub">Regents simulation &middot; timed &middot; no hints</div>
      <div style="max-width:540px;">
        <p style="font-size:15px; margin-bottom:12px;">Each question has <strong>90 seconds</strong>. No lens picker. No walkthrough. Answer and move on. Results show your score by standard after all 24 questions.</p>
        <p style="font-size:14px; color:var(--muted); margin-bottom:12px;">${QUESTION_BANK.length} questions in the bank &middot; 24 drawn per attempt &middot; ${STATE.challenge.attemptCount === 0 ? 'First play is balanced by standard' : 'Randomized draw'}.</p>
        <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">A CSV study guide downloads automatically when you finish.</p>
        <div class="btn-row">
          <button class="btn" onclick="startChallenge()">Start Challenge</button>
          <button class="btn secondary" onclick="navigate('home')">&larr; Back</button>
        </div>
      </div>
    `;
    return;
  }

  if (C.cursor >= C.queue.length) {
    return renderChallengeResults();
  }

  const Q = currentCQ();
  const layout = choiceLayout(Q);
  const pct = (C.secondsLeft / 90) * 100;
  const urgent = C.secondsLeft <= 30;

  const choicesHtml = Q.choices.map(c => {
    const selected = _challengeSelectedChoice === c.label;
    const cls = 'choice' + (selected ? ' selected' : '') + (C.answered ? ' disabled' : '');
    const click = !C.answered ? `onclick="challengePickAnswer('${c.label}')"` : '';
    return `
      <button type="button" class="${cls}" ${click} ${C.answered ? 'disabled' : ''}>
        <span class="choice-label">(${c.label})</span>
        <span>${c.text}</span>
      </button>`;
  }).join('');

  const lockBtn = !C.answered && _challengeSelectedChoice
    ? `<div class="btn-row"><button class="btn" onclick="challengeLockAnswer()">Lock answer &rarr;</button></div>`
    : C.answered
    ? `<div class="btn-row"><button class="btn" onclick="challengeNext()">Next &rarr;</button></div>`
    : '';

  showRail(true, false);
  main.innerHTML = `
    <div class="problem-meta">
      <span>Question ${C.cursor + 1} of ${C.queue.length}</span>
      <span>${Q.standard}</span>
    </div>
    <div class="timer-track">
      <div class="timer-fill${urgent ? ' urgent' : ''}" id="timer-bar" style="width:${pct}%"></div>
    </div>
    <div class="timer-text${urgent ? ' urgent' : ''}" id="timer-text">${formatTime(C.secondsLeft)}</div>
    <div class="problem-stem">${Q.stem}</div>
    <div class="choices ${layout}" id="challenge-choices">${choicesHtml}</div>
    ${lockBtn}
  `;
}

function renderChallengeResults() {
  showRail(false, false);
  const C = STATE.challenge;
  const total = C.answers.length;
  const correct = C.answers.filter(a => a.correct).length;
  const wrong = total - correct;
  ANALYTICS.log('challenge_complete', { total, correct, score_pct: Math.round((correct / total) * 100) });

  // Group by standard
  const byStandard = {};
  C.answers.forEach(a => {
    if (!byStandard[a.standard]) byStandard[a.standard] = { correct: 0, total: 0 };
    byStandard[a.standard].total++;
    if (a.correct) byStandard[a.standard].correct++;
  });

  const rows = Object.entries(byStandard).map(([std, data]) => {
    const pass = data.correct === data.total;
    return `<tr>
      <td>${std}</td>
      <td class="${pass ? 'pass' : 'fail'}">${data.correct}/${data.total}</td>
      <td class="${pass ? 'pass' : 'fail'}">${pass ? 'Solid' : 'Review'}</td>
    </tr>`;
  }).join('');

  main.innerHTML = `
    <div class="challenge-results">
      <div class="section-title">Challenge Complete</div>
      <div class="results-score">${correct}/${total}</div>
      <div class="results-label">${Math.round((correct/total)*100)}% &mdash; ${correct >= total * 0.75 ? 'Passing' : 'Needs Work'}</div>
      <p style="font-size:13px; color:var(--muted); margin:8px 0 16px;">Your results CSV downloaded automatically. Open it in Excel to see which lenses to study.</p>
      <table class="results-table">
        <thead><tr><th>Standard</th><th>Score</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="btn-row">
        <button class="btn secondary" onclick="downloadCSV()">Re-download CSV</button>
        ${wrong > 0 ? `<button class="btn" onclick="startWrongAnswerDrill()">Drill Mistakes (${wrong})</button>` : ''}
        <button class="btn" onclick="resetChallenge()">Try Again</button>
        <button class="btn secondary" onclick="navigate('home')">&larr; Home</button>
      </div>
    </div>
  `;

  // Auto-download on first render of results screen
  setTimeout(downloadCSV, 400);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = String(s % 60).padStart(2, '0');
  return m > 0 ? `${m}:${sec}` : `:${sec}`;
}

/* ============================================================================
   MODULE: UI_HANDLERS
============================================================================ */
function navigate(view) {
  clearChallengeTimer();
  if (view !== 'challenge') STATE.challenge.started = false;
  STATE.view = view;
  STATE.selectedLensId = null;
  if (view === 'practice') {
    STATE.practice.queue = [];
    STATE.practice.cursor = 0;
    STATE.practice.subView = 'home';
    STATE.practice.drillMode = 'free';
    STATE.practice.filterStandard = null;
    STATE.practice.filterLens = null;
    STATE.practice.wrongPool = [];
  }
  document.querySelectorAll('#nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  render();
  ANALYTICS.log('view_change', { view });
}

function selectLens(id) { STATE.selectedLensId = id; ANALYTICS.log('lens_view', { lens_id: id }); render(); }
function clearLensSelection() { STATE.selectedLensId = null; render(); }

/* Practice handlers */
function startPractice(drillMode = 'free', filter = null) {
  let pool = QUESTION_BANK;
  if (drillMode === 'standard' && filter) {
    const cluster = STANDARD_CLUSTERS.find(c => c.key === filter);
    if (cluster) pool = QUESTION_BANK.filter(q => cluster.standards.includes(q.standard));
  } else if (drillMode === 'lens' && filter !== null) {
    pool = QUESTION_BANK.filter(q => q.applicableLenses.includes(filter));
  } else if (drillMode === 'wrong') {
    pool = STATE.practice.wrongPool;
  }
  if (!pool.length) pool = QUESTION_BANK;
  STATE.practice.queue = shuffle(pool.map(q => q.id));
  STATE.practice.cursor = 0;
  STATE.practice.drillMode = drillMode;
  STATE.practice.filterStandard = drillMode === 'standard' ? filter : null;
  STATE.practice.filterLens = drillMode === 'lens' ? filter : null;
  STATE.practice.lensGuess = drillMode === 'lens' ? filter : null;
  STATE.practice.phase = drillMode === 'lens' ? 'answer' : 'lens-pick';
  STATE.practice.answerPick = null;
  STATE.practice.subView = 'active';
  render();
}

function pickLens(lensId) {
  const Q = currentQ();
  STATE.practice.lensGuess = lensId;
  STATE.practice.phase = 'walkthrough';
  ANALYTICS.log('lens_pick', { qid: Q.id, standard: Q.standard, picked_lens: lensId, best_lens: Q.bestLens, was_valid: Q.applicableLenses.includes(lensId) });
  render();
}

function resetLensPick() { STATE.practice.lensGuess = null; STATE.practice.phase = 'lens-pick'; render(); }
function advanceToAnswer() { STATE.practice.phase = 'answer'; render(); }
function pickAnswer(label) { STATE.practice.answerPick = label; render(); }

function lockAnswer() {
  const Q = currentQ();
  const correct = STATE.practice.answerPick === Q.correctAnswer;
  STATE.practice.phase = 'review';
  ANALYTICS.log('mc_attempt', { qid: Q.id, standard: Q.standard, lens_used: STATE.practice.lensGuess, picked_choice: STATE.practice.answerPick, correct, error_tag: correct ? null : Q.errorTags[0] });
  render();
}

function nextPracticeQ() {
  if (STATE.practice.cursor < STATE.practice.queue.length - 1) {
    STATE.practice.cursor++;
    const isLensDrill = STATE.practice.drillMode === 'lens';
    STATE.practice.phase = isLensDrill ? 'answer' : 'lens-pick';
    STATE.practice.lensGuess = isLensDrill ? STATE.practice.filterLens : null;
    STATE.practice.answerPick = null;
    render();
  } else {
    renderPracticeComplete();
  }
}

function renderPracticeComplete() {
  showRail(false, false);
  main.innerHTML = `
    <div style="max-width:480px; margin: 40px auto; text-align:center;">
      <div class="section-title" style="text-align:center; border:none;">Practice Complete</div>
      <p style="font-size:15px; margin: 16px 0 24px; color:var(--muted);">You&rsquo;ve finished all ${STATE.practice.queue.length} question${STATE.practice.queue.length !== 1 ? 's' : ''} in this set.</p>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn" onclick="startPractice();">Practice Again</button>
        <button class="btn secondary" onclick="navigate('challenge')">Try Challenge Mode</button>
      </div>
    </div>
  `;
}

function startWrongAnswerDrill() {
  const wrongIds = STATE.challenge.answers.filter(a => !a.correct).map(a => a.qid);
  STATE.practice.wrongPool = QUESTION_BANK.filter(q => wrongIds.includes(q.id));
  STATE.view = 'practice';
  document.querySelectorAll('#nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === 'practice');
  });
  startPractice('wrong');
}

/* Challenge handlers */
function startChallenge() {
  const C = STATE.challenge;
  clearChallengeTimer();
  C.started = true;
  C.queue = sampleChallenge(C.attemptCount);
  C.attemptCount++;
  C.cursor = 0;
  C.answers = [];
  C.answered = false;
  _challengeSelectedChoice = null;
  render();
  startChallengeTimer();
}

function resetChallenge() {
  clearChallengeTimer();
  STATE.challenge.started = false;
  render();
}

let _challengeSelectedChoice = null;

function challengePickAnswer(label) {
  _challengeSelectedChoice = label;
  render();
  // Re-attach timer DOM refs after re-render
  // (interval continues; it finds fresh #timer-bar and #timer-text by ID)
}

function challengeLockAnswer() {
  if (!_challengeSelectedChoice) return;
  const C = STATE.challenge;
  const Q = currentCQ();
  const correct = _challengeSelectedChoice === Q.correctAnswer;
  const timeSpent = Math.round((Date.now() - (C.questionStartTime || Date.now())) / 1000);
  const bestL = getLens(Q.bestLens);
  C.answers.push({
    qid: Q.id, picked: _challengeSelectedChoice, correct, standard: Q.standard,
    errorTag: correct ? null : Q.errorTags[0],
    timeSpent,
    stem: Q.stem.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim(),
    bestLens: bestL ? bestL.name : Q.bestLens
  });
  C.answered = true;
  clearChallengeTimer();
  ANALYTICS.log('challenge_attempt', { qid: Q.id, standard: Q.standard, picked_choice: _challengeSelectedChoice, correct_answer: Q.correctAnswer, correct, time_spent_s: timeSpent, best_lens: Q.bestLens });
  _challengeSelectedChoice = null;
  challengeNext();
}

function challengeNext() {
  const C = STATE.challenge;
  if (!C.answered) {
    const Q = currentCQ();
    if (Q) {
      const bestL = getLens(Q.bestLens);
      C.answers.push({
        qid: Q.id, picked: null, correct: false, standard: Q.standard, errorTag: 'no_answer',
        timeSpent: 90,
        stem: Q.stem.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim(),
        bestLens: bestL ? bestL.name : Q.bestLens
      });
    }
  }
  C.cursor++;
  C.answered = false;
  C.secondsLeft = 90;
  _challengeSelectedChoice = null;
  render();
  if (C.cursor < C.queue.length) startChallengeTimer();
}

function startChallengeTimer() {
  clearChallengeTimer();
  STATE.challenge.questionStartTime = Date.now();
  STATE.challenge.timerInterval = setInterval(() => {
    STATE.challenge.secondsLeft--;
    const bar = document.getElementById('timer-bar');
    const txt = document.getElementById('timer-text');
    if (bar) {
      const pct = (STATE.challenge.secondsLeft / 90) * 100;
      bar.style.width = pct + '%';
      if (STATE.challenge.secondsLeft <= 30) bar.classList.add('urgent');
    }
    if (txt) {
      txt.textContent = formatTime(STATE.challenge.secondsLeft);
      if (STATE.challenge.secondsLeft <= 30) txt.classList.add('urgent');
    }
    if (STATE.challenge.secondsLeft <= 0) {
      clearChallengeTimer();
      challengeNext();
    }
  }, 1000);
}

function clearChallengeTimer() {
  if (STATE.challenge.timerInterval) {
    clearInterval(STATE.challenge.timerInterval);
    STATE.challenge.timerInterval = null;
  }
}

function generateCSV() {
  const C = STATE.challenge;
  const sid = ANALYTICS.sessionId;
  const headers = 'sid,question_id,standard,student_answer,correct_answer,result,time_spent_seconds,question_stem,best_lens';
  const rows = C.answers.map(a => {
    const q = getQ(a.qid);
    const stem = '"' + (a.stem || '').replace(/"/g, '""') + '"';
    return [sid, a.qid, a.standard, a.picked || 'no_answer', q ? q.correctAnswer : '', a.correct ? 'correct' : 'incorrect', a.timeSpent, stem, a.bestLens || ''].join(',');
  });
  return [headers, ...rows].join('\n');
}

function downloadCSV() {
  const csv = generateCSV();
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'regents-lockIn-' + ANALYTICS.sessionId.slice(-8) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

window.runPuzzleTests = function() {
  const VALID_LABELS = new Set(['1', '2', '3', '4']);
  let passed = 0;
  let failed = 0;

  QUESTION_BANK.forEach(q => {
    const id = q.id;
    const errors = [];

    // (a) exactly 4 choices with labels '1'–'4'
    if (!q.choices || q.choices.length !== 4) {
      errors.push('choice count ' + (q.choices ? q.choices.length : 0) + ' ≠ 4');
    } else {
      const labelSet = new Set(q.choices.map(c => c.label));
      ['1','2','3','4'].forEach(l => { if (!labelSet.has(l)) errors.push('missing label ' + l); });
      q.choices.forEach(c => { if (!VALID_LABELS.has(c.label)) errors.push('invalid label ' + c.label); });
    }

    // (b) correctAnswer is one of the 4 labels
    if (!VALID_LABELS.has(q.correctAnswer)) {
      errors.push('correctAnswer "' + q.correctAnswer + '" not in {1,2,3,4}');
    }

    // (c) bestLens is in applicableLenses
    if (!Array.isArray(q.applicableLenses) || !q.applicableLenses.includes(q.bestLens)) {
      errors.push('bestLens ' + q.bestLens + ' not in applicableLenses [' + (q.applicableLenses || []).join(',') + ']');
    }

    if (errors.length === 0) {
      console.log('[runPuzzleTests] PASS ' + id);
      passed++;
    } else {
      console.error('[runPuzzleTests] FAIL ' + id + ': ' + errors.join('; '));
      failed++;
    }
  });

  console.log('[runPuzzleTests] ' + passed + ' passed, ' + failed + ' failed — ' + QUESTION_BANK.length + ' questions checked');
  return { passed, failed, total: QUESTION_BANK.length };
};
